<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 Page Not Found</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#7f1d1d,#dc2626,#f97316);
color:white;
overflow:hidden;
}

.container{
text-align:center;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:70px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,.4);
}

h1{
font-size:120px;
}

h2{
margin-top:10px;
font-size:40px;
}

p{
margin-top:20px;
font-size:20px;
opacity:.9;
}

a{
display:inline-block;
margin-top:35px;
padding:16px 40px;
background:white;
color:#dc2626;
font-size:18px;
font-weight:bold;
text-decoration:none;
border-radius:50px;
transition:.3s;
}

a:hover{
background:#000;
color:white;
transform:translateY(-5px);
}

</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Oops!</h2>

<p>
The page you're looking for doesn't exist.
</p>

<a href="/">🏠 Back to Home</a>

</div>

</body>
</html>
